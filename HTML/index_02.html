<!DOCTYPE html>
<html lang="es">
  <head>
     <meta charset="UTF-8">
     <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>CSS_02</title>
     <style>
        h1{color:aqua;}
        body{background-color:blueviolet;}
        p{font-size:25px;}
     </style>
  </head>
  <body>
    <header>
        <h1>Estilos CSS desde el head</h1>
    </header>
    <main>
        <p>Este parrafo recibe su estilo desde la etiqueta style</p>
        <p>Los estilos CSS estan separado del contenido HTML</p>
    </main>
  </body>
</html>
